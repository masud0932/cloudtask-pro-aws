version: "3.9"

services:
  db:
    image: postgres:16
    container_name: cloudtask-postgres
    environment:
      POSTGRES_DB: cloudtask
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"

  backend:
    build: .
    container_name: cloudtask-backend
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - db
